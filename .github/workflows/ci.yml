---
# =============================================================================
# .github/workflows/ci.yml - GitHub Actions CI pipeline for IIS Ansible role
# =============================================================================
# Jobs:
#   lint        - ansible-lint code quality check (Ubuntu, every push)
#   syntax      - Ansible syntax validation (Ubuntu, every push)
#   integration - Full playbook run against a real Windows Server 2022 runner
#
# The integration job runs on a windows-2022 GitHub-hosted runner.
# Ansible cannot use Windows as a control node (Unix-only), so it runs inside
# WSL (Ubuntu installed via Vampire/setup-wsl). WSL connects back to Windows
# via WinRM using the WSL 2 gateway IP from /etc/resolv.conf.
#
# CI-specific overrides (no D-drive, single .NET version) are in ci/inventory/.

name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]

env:
  ANSIBLE_FORCE_COLOR: "1"
  PY_COLORS: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ansible-lint on Ubuntu (fast, no Windows needed)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        id: collections-cache-lint
        with:
          path: collections
          key: collections-${{ hashFiles('requirements.yml') }}

      - name: Install Ansible collections
        if: steps.collections-cache-lint.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            ansible-galaxy collection install -r requirements.yml && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run ansible-lint
        run: ansible-lint --nocolor --profile min

  # ---------------------------------------------------------------------------
  # Syntax check: validate playbook YAML/Jinja2 without connecting to hosts
  # ---------------------------------------------------------------------------
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        id: collections-cache-syntax
        with:
          path: collections
          key: collections-${{ hashFiles('requirements.yml') }}

      - name: Install Ansible collections
        if: steps.collections-cache-syntax.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            ansible-galaxy collection install -r requirements.yml && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Ansible syntax check
        run: ansible-playbook playbooks/site.yml --syntax-check -i ci/inventory/hosts.yml

  # ---------------------------------------------------------------------------
  # Integration: full playbook run on a real Windows Server 2022 runner.
  # Ansible runs from WSL (Ubuntu) on the same machine; Windows is the target.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration test (Windows Server 2022)
    runs-on: windows-2022
    needs: [lint, syntax]

    steps:
      - uses: actions/checkout@v6

      # Configure WinRM for HTTP basic auth (safe: ephemeral runner only)
      - name: Configure WinRM and create CI test user
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          # Generate a random password (lives only for this runner job)
          Add-Type -AssemblyName System.Web
          $ciPassword = [System.Web.Security.Membership]::GeneratePassword(20, 4)
          "CI_ANSIBLE_PASSWORD=$ciPassword" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Enable PowerShell Remoting (required for PSRP connection plugin)
          Enable-PSRemoting -Force -SkipNetworkProfileCheck

          # Enable WinRM with HTTP basic auth
          winrm quickconfig -force
          winrm set winrm/config/service/auth '@{Basic="true"}'
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          Set-Item WSMan:\localhost\Client\TrustedHosts -Value "*" -Force

          # Allow WinRM from the WSL 2 virtual network (172.x.x.x subnet)
          New-NetFirewallRule -DisplayName "WinRM for WSL" -Direction Inbound `
            -Protocol TCP -LocalPort 5985 -Action Allow -Profile Any

          # Create a temporary local admin account for Ansible
          $securePass = ConvertTo-SecureString $ciPassword -AsPlainText -Force
          New-LocalUser -Name "ansible-ci" -Password $securePass `
            -FullName "Ansible CI" -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "ansible-ci"

          Write-Host "WinRM configured on port 5985 (HTTP), CI user created"

      # Install Ubuntu in WSL and register the wsl-bash shell for later steps
      - uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-22.04
          update: "true"
          additional-packages: python3-pip python3-venv

      # Configure WSL before the first wsl-bash step, then restart WSL so
      # settings take effect:
      # - DrvFs metadata: files on NTFS mounts get proper permissions (0644
      #   instead of 0777), allowing Ansible to read ansible.cfg directly.
      # - Timezone: export TZ to GITHUB_ENV so all wsl-bash steps inherit it
      #   via WSLENV; profile_tasks/timer callbacks then show local time.
      - name: Configure WSL (DrvFs metadata, timezone) and restart
        shell: powershell
        run: |
          # Write wsl.conf via bash printf to avoid Windows CRLF line endings.
          # PowerShell here-strings produce \r\n which WSL's wsl.conf parser
          # rejects as invalid key names.
          wsl --exec sh -c "printf '[automount]\nenabled = true\noptions = ""metadata,uid=1000,gid=1000,fmask=022,dmask=022""\n' > /etc/wsl.conf"
          # Export iana_timezone from CI group_vars as TZ so all subsequent
          # wsl-bash steps inherit it via WSLENV. This is more reliable than
          # setting /etc/localtime, which Python may not pick up in WSL.
          $tz = (Select-String -Path 'ci/inventory/group_vars/all.yml' -Pattern '^iana_timezone:\s+"([^"]+)"').Matches.Groups[1].Value
          "TZ=$tz" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          wsl --shutdown

      - name: Install Ansible in WSL
        shell: wsl-bash {0}
        run: |
          python3 -m venv /tmp/ansible-venv
          /tmp/ansible-venv/bin/pip install -q -r requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        id: collections-cache-integration
        with:
          path: collections
          key: collections-${{ hashFiles('requirements.yml') }}

      - name: Install Ansible collections in WSL
        if: steps.collections-cache-integration.outputs.cache-hit != 'true'
        shell: wsl-bash {0}
        run: |
          for i in 1 2 3; do
            /tmp/ansible-venv/bin/ansible-galaxy collection install \
              -r requirements.yml --collections-path collections && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Run Ansible playbook from WSL
        shell: wsl-bash {0}
        env:
          CI_ANSIBLE_PASSWORD: ${{ env.CI_ANSIBLE_PASSWORD }}
          WSLENV: CI_ANSIBLE_PASSWORD:ANSIBLE_FORCE_COLOR:PY_COLORS:TZ
        run: |
          # WSL 2: use default gateway. WSL 1: no default route, use 127.0.0.1.
          WIN_HOST_IP=$(ip route | awk '/^default/ {print $3; exit}')
          [ -z "$WIN_HOST_IP" ] && WIN_HOST_IP="127.0.0.1"
          echo "Windows host IP: $WIN_HOST_IP"
          # Write credentials to JSON so special chars (e.g. {%) in the
          # generated password are not misinterpreted as Jinja2 by Ansible
          python3 -c "import json,os; open('/tmp/ci_vars.json','w').write(json.dumps({'ansible_user':'ansible-ci','ansible_password':os.environ['CI_ANSIBLE_PASSWORD']}))"
          ANSIBLE_ROLES_PATH=roles ANSIBLE_COLLECTIONS_PATH=collections \
          ANSIBLE_CACHE_PLUGIN=memory \
          /tmp/ansible-venv/bin/ansible-playbook playbooks/site.yml \
            -i ci/inventory/hosts.yml \
            -e "ansible_host=$WIN_HOST_IP" \
            -e @/tmp/ci_vars.json \
            --skip-tags dotnet_ngen,dotnet_cleanup,iis_rewrite_example \
            -v

      - name: Idempotency check (second run must report changed=0)
        shell: wsl-bash {0}
        env:
          CI_ANSIBLE_PASSWORD: ${{ env.CI_ANSIBLE_PASSWORD }}
          WSLENV: CI_ANSIBLE_PASSWORD:ANSIBLE_FORCE_COLOR:PY_COLORS:TZ
        run: |
          WIN_HOST_IP=$(ip route | awk '/^default/ {print $3; exit}')
          [ -z "$WIN_HOST_IP" ] && WIN_HOST_IP="127.0.0.1"
          python3 -c "import json,os; open('/tmp/ci_vars.json','w').write(json.dumps({'ansible_user':'ansible-ci','ansible_password':os.environ['CI_ANSIBLE_PASSWORD']}))"
          tmplog=$(mktemp)
          ANSIBLE_ROLES_PATH=roles ANSIBLE_COLLECTIONS_PATH=collections \
          ANSIBLE_CACHE_PLUGIN=memory \
            /tmp/ansible-venv/bin/ansible-playbook playbooks/site.yml \
            -i ci/inventory/hosts.yml \
            -e "ansible_host=$WIN_HOST_IP" \
            -e @/tmp/ci_vars.json \
            --skip-tags dotnet_ngen,dotnet_cleanup,iis_rewrite_example 2>&1 | tee "$tmplog"
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "Playbook failed on second run"
            exit 1
          fi
          total_changed=$(grep -oP 'changed=\K[0-9]+' "$tmplog" | awk '{s+=$1} END {print s+0}')
          if [ "$total_changed" -gt 0 ]; then
            echo "Idempotency check FAILED: $total_changed task(s) changed on second run"
            exit 1
          fi
          echo "Idempotency check PASSED (changed=0)"

      - name: Verify IIS is listening on configured ports
        shell: powershell
        run: |
          $portsToVerify = @(80)
          $failed = @()

          foreach ($port in $portsToVerify) {
            $listeners = Get-NetTCPConnection -State Listen -LocalPort $port -ErrorAction SilentlyContinue
            if ($listeners) {
              foreach ($l in $listeners) {
                $proc = Get-Process -Id $l.OwningProcess -ErrorAction SilentlyContinue
                $procName = if ($proc) { $proc.Name } else { "unknown" }
                Write-Host "Port $port listening on $($l.LocalAddress) - PID $($l.OwningProcess) ($procName)"
              }
            } else {
              Write-Host "Port $port is NOT listening"
              $failed += $port
            }
          }

          if ($failed.Count -gt 0) {
            Write-Error "The following ports are not listening: $($failed -join ', ')"
            exit 1
          }
          Write-Host "All required ports are listening."

          # HTTP smoke test: any response from IIS proves it is serving requests.
          # An empty wwwroot returns 403.14 (directory listing disabled), not 404.
          # Bypass system proxy and force a new TCP connection each attempt to
          # avoid keep-alive connection reuse across retries.
          [System.Net.WebRequest]::DefaultWebProxy = [System.Net.GlobalProxySelection]::GetEmptyWebProxy()
          $url = "http://127.0.0.1/"
          $maxAttempts = 5
          $httpOk = $false
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            [System.Net.ServicePointManager]::FindServicePoint($url).CloseConnectionGroup("") | Out-Null
            try {
              $response = Invoke-WebRequest -Uri $url -TimeoutSec 10 `
                -UseBasicParsing -ErrorAction Stop
              Write-Host "HTTP check: $($response.StatusCode) $($response.StatusDescription) from $url"
              Write-Host "  Server: $($response.Headers['Server'])"
              if ($response.Content) {
                Write-Host "  Body  : $($response.Content.Substring(0, [Math]::Min(500, $response.Content.Length)))"
              }
              $httpOk = $true
              break
            } catch [System.Net.WebException] {
              $webEx = $_.Exception
              if ($webEx.Response -ne $null) {
                $resp = $webEx.Response
                $code = [int]$resp.StatusCode
                Write-Host "HTTP check: $code $($resp.StatusDescription) from $url (error response accepted)"
                Write-Host "  Server: $($resp.Headers['Server'])"
                $reader = New-Object System.IO.StreamReader($resp.GetResponseStream())
                $body = $reader.ReadToEnd()
                $reader.Close()
                if ($body) {
                  Write-Host "  Body  : $($body.Substring(0, [Math]::Min(500, $body.Length)))"
                }
                $httpOk = $true
                break
              }
              Write-Host "Attempt $attempt of $maxAttempts failed"
              Write-Host "  Type   : $($webEx.GetType().FullName)"
              Write-Host "  Status : $($webEx.Status)"
              Write-Host "  Message: $($webEx.Message)"
              if ($webEx.InnerException) {
                Write-Host "  Inner  : $($webEx.InnerException.GetType().FullName): $($webEx.InnerException.Message)"
              }
              Write-Host "  Stack  : $($webEx.StackTrace)"
              if ($attempt -lt $maxAttempts) { Start-Sleep -Seconds 3 }
            } catch {
              Write-Host "Attempt $attempt of $maxAttempts failed (unexpected exception)"
              Write-Host "  Type   : $($_.Exception.GetType().FullName)"
              Write-Host "  Message: $($_.Exception.Message)"
              Write-Host "  Stack  : $($_.Exception.StackTrace)"
              if ($attempt -lt $maxAttempts) { Start-Sleep -Seconds 3 }
            }
          }
          if (-not $httpOk) {
            Write-Error "IIS did not respond over HTTP after $maxAttempts attempts"
            exit 1
          }
