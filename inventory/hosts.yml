---
# =============================================================================
# inventory/hosts.yml - OTAP inventory in YAML format
# =============================================================================
# OTAP stands for: Ontwikkeling (Development), Test, Acceptatie (Acceptance), Productie (Production)
#
# Structure:
#   all
#   └── windows              (all Windows hosts - connection settings)
#       ├── otap_o           (Development)
#       ├── otap_t           (Test)
#       ├── otap_a           (Acceptance)
#       └── otap_p           (Production)
#
# Replace the example IP addresses and hostnames with actual values.
# Passwords are set in group_vars via Ansible Vault.

all:
  children:

    # -------------------------------------------------------------------------
    # Group: windows
    # All Windows hosts belong here. Connection settings are configured
    # in inventory/group_vars/windows/main.yml
    # -------------------------------------------------------------------------
    windows:
      children:

        # ---------------------------------------------------------------------
        # Environment: Development (O)
        # Characteristics: single server, minimal resources, developers have
        #                  direct access
        # ---------------------------------------------------------------------
        otap_o:
          hosts:
            web-o-01:
              ansible_host: 10.0.0.11
              # Optional host-specific variables
              iis_server_comment: "Development web server 01"

        # ---------------------------------------------------------------------
        # Environment: Test (T)
        # Characteristics: mirrors production configuration, functional tests
        # ---------------------------------------------------------------------
        otap_t:
          hosts:
            web-t-01:
              ansible_host: 10.1.0.11
              iis_server_comment: "Test web server 01"

            # Multiple servers per environment are possible
            web-t-02:
              ansible_host: 10.1.0.12
              iis_server_comment: "Test web server 02"

        # ---------------------------------------------------------------------
        # Environment: Acceptance (A)
        # Characteristics: production mirror, user acceptance tests (UAT),
        #                  load balancer required
        # ---------------------------------------------------------------------
        otap_a:
          hosts:
            web-a-01:
              ansible_host: 10.2.0.11
              iis_server_comment: "Acceptance web server 01"

            web-a-02:
              ansible_host: 10.2.0.12
              iis_server_comment: "Acceptance web server 02"

        # ---------------------------------------------------------------------
        # Environment: Production (P)
        # Characteristics: high availability, extra caution required,
        #                  use --limit otap_p to deploy selectively
        # ---------------------------------------------------------------------
        otap_p:
          hosts:
            web-p-01:
              ansible_host: 10.3.0.11
              iis_server_comment: "Production web server 01"

            web-p-02:
              ansible_host: 10.3.0.12
              iis_server_comment: "Production web server 02"

            web-p-03:
              ansible_host: 10.3.0.13
              iis_server_comment: "Production web server 03"
