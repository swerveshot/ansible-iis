---
# =============================================================================
# inventory/group_vars/otap_a/main.yml - Acceptance (mirrors production)
# =============================================================================
otap_environment: "acceptance"
otap_environment_short: "a"

# Mirrors production: only LTS versions (dropping STS .NET 9 is an option)
iis_dotnet_enabled_versions:
  - "8"
  - "9"
  - "10"

iis_log_flags: "Date,Time,ClientIP,UserName,SiteName,ServerIP,Method,UriStem,UriQuery,HttpStatus,Win32Status,BytesSent,BytesRecv,TimeTaken"
iis_allow_http: false   # Mirror of production: HTTPS only
iis_allow_https: true
