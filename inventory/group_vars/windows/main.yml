---
# =============================================================================
# inventory/group_vars/windows/main.yml - PSRP connection settings
# =============================================================================
# SECURITY: This file contains NO credentials or usernames.
# Store those in an Ansible Vault file that never ends up in git.
#
# Create vault credentials:
#   ansible-vault create inventory/group_vars/windows/vault.yml
#
# Contents of vault.yml (create with ansible-vault, then store encrypted):
#   vault_ansible_user:     "your_service_account"
#   vault_ansible_password: "your_password"
#
# Then reference from this file:
#   ansible_user:     "{{ vault_ansible_user }}"
#   ansible_password: "{{ vault_ansible_password }}"

# --- Connection type --------------------------------------------------------
# psrp (PowerShell Remoting Protocol) is faster than winrm because it
# supports pipelining: tasks reuse the same connection instead of
# opening a new one for each module invocation.
ansible_connection: psrp

# --- Authentication ---------------------------------------------------------
ansible_user: "{{ vault_ansible_user }}"
ansible_password: "{{ vault_ansible_password }}"

# Auth protocol: ntlm (workgroup), kerberos (Active Directory, recommended),
# negotiate (auto-selects between ntlm and kerberos).
# For kerberos: pip install 'pypsrp[kerberos]' + krb5-user OS package.
ansible_psrp_auth: ntlm

# --- Protocol and port ------------------------------------------------------
# HTTPS (5986) required for production; HTTP (5985) only in isolated test environments.
ansible_port: 5986
ansible_psrp_protocol: https

# --- Certificate validation -------------------------------------------------
# Default: ignore (for self-signed certificates in test/development).
# Override in otap_p/main.yml to 'validate' for production.
ansible_psrp_cert_validation: ignore

# --- Pipelining (key PSRP advantage over winrm) ----------------------------
# Pipelining lets multiple tasks share a single connection, avoiding the
# per-task setup overhead. Not available with ansible_connection: winrm.
ansible_pipelining: true

# --- Timeouts ---------------------------------------------------------------
ansible_psrp_connection_timeout: 120
ansible_psrp_read_timeout: 130
