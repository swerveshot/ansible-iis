---
# =============================================================================
# inventory/group_vars/otap_p/main.yml - Production
# =============================================================================
# NOTE: always use --check --diff before running against production.
otap_environment: "production"
otap_environment_short: "p"

# Production: consider only LTS versions (.NET 9 STS approaching EOL Nov 2026)
iis_dotnet_enabled_versions:
  - "8"
  - "9"   # STS - EOL Nov 2026: plan migration to .NET 10
  - "10"

iis_log_flags: "Date,Time,ClientIP,UserName,SiteName,ServerIP,Method,UriStem,UriQuery,HttpStatus,Win32Status,BytesSent,BytesRecv,TimeTaken"
iis_allow_http: false
iis_allow_https: true

# Production uses a CA-signed certificate
ansible_winrm_server_cert_validation: validate
