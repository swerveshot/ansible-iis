---
# =============================================================================
# ci/inventory/hosts.yml - CI-specific inventory (GitHub Actions)
# =============================================================================
# The Windows runner targets itself via WinRM on localhost.
# Credentials are injected at runtime via --extra-vars in the workflow.
# No OTAP groups: CI uses a single 'windows' host.

all:
  children:
    windows:
      hosts:
        ci-target:
          ansible_host: 127.0.0.1
