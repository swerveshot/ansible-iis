---
# =============================================================================
# roles/iis/defaults/main.yml - Default role values (lowest priority)
# =============================================================================
# All variables here are intended to be overridden via:
#   inventory/group_vars/, host_vars/, or --extra-vars

# --- IIS Windows features ---------------------------------------------------
iis_features:
  - Web-Server
  - Web-WebServer
  - Web-Common-Http
  - Web-Default-Doc
  - Web-Dir-Browsing
  - Web-Http-Errors
  - Web-Static-Content
  - Web-Http-Redirect
  - Web-Health
  - Web-Http-Logging
  - Web-Custom-Logging
  - Web-Log-Libraries
  - Web-Request-Monitor
  - Web-Http-Tracing
  - Web-Performance
  - Web-Stat-Compression
  - Web-Dyn-Compression
  - Web-Security
  - Web-Filtering
  - Web-Basic-Auth
  - Web-Windows-Auth
  - Web-Digest-Auth
  - Web-IP-Security
  - Web-Url-Auth
  - Web-App-Dev
  - Web-Asp-Net45
  - Web-Net-Ext45
  - Web-ISAPI-Ext
  - Web-ISAPI-Filter
  - Web-Includes
  - Web-WebSockets
  - Web-Mgmt-Tools
  - Web-Mgmt-Console
  - Web-Mgmt-Compat
  - Web-Scripting-Tools
  - Web-Mgmt-Service
  - NET-Framework-45-Core
  - NET-Framework-45-ASPNET

# --- IIS Application Pools --------------------------------------------------
iis_app_pools:
  - name: "DefaultAppPool"
    managed_runtime_version: ""   # Empty = No Managed Code (.NET Core / .NET 5+)
    managed_pipeline_mode: "Integrated"
    state: started
    attributes:
      recycling.periodicRestart.time: "00:00:00"
      processModel.idleTimeout: "00:20:00"
      processModel.loadUserProfile: "true"
      failure.rapidFailProtection: "true"
      failure.rapidFailProtectionMaxCrashes: "5"

# --- IIS general settings ---------------------------------------------------
iis_default_site_name: "Default Web Site"
iis_default_app_pool: "DefaultAppPool"
iis_http_port: 80
iis_https_port: 443
iis_log_format: "W3C"
iis_log_period: "Daily"

# --- IIS Rewrite Module -----------------------------------------------------
iis_install_rewrite_module: true

# --- .NET versions ----------------------------------------------------------
# Which major versions are installed. Override per environment in
# group_vars/otap_*/main.yml to exclude a version.
# Lifecycle (May 2026): 8=LTS(EOL Nov'26), 9=STS(EOL Nov'26), 10=LTS(EOL Nov'28)
iis_dotnet_enabled_versions:
  - "8"
  - "9"
  - "10"

# Version metadata per .NET channel.
# URL and checksum are fetched at runtime from the Microsoft .NET Releases API
# (https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json)
# so no manual updates are needed on new patch releases.
iis_dotnet_versions:
  - major: "8"
    dotnet_channel_version: "8.0"
    support_type: "LTS"
    eol_date: "2026-11-10"

  - major: "9"
    dotnet_channel_version: "9.0"
    support_type: "STS"
    eol_date: "2026-11-10"

  - major: "10"
    dotnet_channel_version: "10.0"
    support_type: "LTS"
    eol_date: "2028-11-14"

# Install x86 runtime separately alongside the Hosting Bundle (for explicit 32-bit verification)
iis_dotnet_install_individual_x86: true
