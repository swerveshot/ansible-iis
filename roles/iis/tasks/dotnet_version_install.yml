---
# =============================================================================
# roles/iis/tasks/_dotnet_version_install.yml
# =============================================================================
# Installs one .NET version (Hosting Bundle + optional standalone x86 runtime).
# Called via include_tasks from tasks/main.yml.
#
# Expects variable `dotnet_pkg` (dict) with fields:
#   major                  (str)  E.g. "8"
#   dotnet_channel_version (str)  E.g. "8.0"
#   support_type           (str)  "LTS" or "STS"
#   eol_date               (str)  E.g. "2026-11-10"
#
# URL and SHA512 checksum are resolved at runtime from the Microsoft
# .NET Releases API; no manual updates are needed on new patch releases.

# --- Fetch download metadata from Microsoft .NET Releases API ---------------

- name: "[.NET {{ dotnet_pkg.major }}] Fetch .NET release index"
  ansible.builtin.uri:
    url: "https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json"
    return_content: true
  register: dotnet_release_index
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "[.NET {{ dotnet_pkg.major }}] Fetch per-channel release metadata"
  ansible.builtin.uri:
    url: >-
      {{ (dotnet_release_index.json['releases-index'] |
          selectattr('channel-version', 'equalto', dotnet_pkg.dotnet_channel_version) |
          first)['releases.json'] }}
    return_content: true
  register: dotnet_releases
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "[.NET {{ dotnet_pkg.major }}] Set latest release entry fact"
  ansible.builtin.set_fact:
    dotnet_latest_version: "{{ dotnet_releases.json['latest-release'] }}"
    _dotnet_latest_release: >-
      {{ dotnet_releases.json.releases |
         selectattr('release-version', 'equalto', dotnet_releases.json['latest-release']) |
         first }}

- name: "[.NET {{ dotnet_pkg.major }}] Set Hosting Bundle download facts"
  ansible.builtin.set_fact:
    dotnet_hosting_url: >-
      {{ (_dotnet_latest_release['aspnetcore-runtime'].files |
          selectattr('name', 'equalto', 'dotnet-hosting-win.exe') |
          first).url }}
    dotnet_hosting_checksum: >-
      {{ (_dotnet_latest_release['aspnetcore-runtime'].files |
          selectattr('name', 'equalto', 'dotnet-hosting-win.exe') |
          first).hash }}

- name: "[.NET {{ dotnet_pkg.major }}] Set x86 runtime download facts"
  ansible.builtin.set_fact:
    dotnet_runtime_x86_url: >-
      {{ (_dotnet_latest_release.runtime.files |
          selectattr('name', 'equalto', 'dotnet-runtime-win-x86.exe') |
          first).url }}
    dotnet_runtime_x86_checksum: >-
      {{ (_dotnet_latest_release.runtime.files |
          selectattr('name', 'equalto', 'dotnet-runtime-win-x86.exe') |
          first).hash }}
  when: iis_dotnet_install_individual_x86 | bool

# --- Detect whether this version is already installed ----------------------
- name: "[.NET {{ dotnet_pkg.major }}] Detect installation"
  ansible.windows.win_powershell:
    script: |
      $major    = "{{ dotnet_pkg.major }}"
      $installed = $false
      $version   = $null

      # Primary check: dotnet CLI (fastest)
      $dotnetExe = "$env:ProgramFiles\dotnet\dotnet.exe"
      if (Test-Path $dotnetExe) {
        $match = & $dotnetExe --list-runtimes 2>$null |
          Where-Object { $_ -match "Microsoft\.NETCore\.App $major\." }
        if ($match) {
          $installed = $true
          $version   = ($match | Select-Object -Last 1) -replace "^Microsoft\.NETCore\.App (\S+).*", '$1'
        }
      }

      # Fallback: registry (when dotnet.exe is not yet on PATH)
      if (-not $installed -and (Test-Path "{{ iis_dotnet_registry_runtimes_x64 }}")) {
        $keys = (Get-ItemProperty "{{ iis_dotnet_registry_runtimes_x64 }}" -ErrorAction SilentlyContinue).PSObject.Properties |
          Where-Object { $_.Name -like "$major.*" }
        if ($keys) {
          $installed = $true
          $version   = ($keys | Select-Object -Last 1).Name
        }
      }

      $Ansible.Result  = @{ installed = $installed; version = $version }
      $Ansible.Changed = $false
  register: dotnet_pkg_check

- name: "[.NET {{ dotnet_pkg.major }}] Status: {{ dotnet_pkg.support_type }} (EOL: {{ dotnet_pkg.eol_date }})"
  ansible.builtin.debug:
    msg: >-
      .NET {{ dotnet_pkg.major }}:
      {{ 'v' + dotnet_pkg_check.result.version + ' already installed'
         if dotnet_pkg_check.result.installed
         else 'not present — v' + dotnet_latest_version + ' will be installed' }}

# --- Download Hosting Bundle ------------------------------------------------
# The Hosting Bundle includes: Runtime x64, Runtime x86, ASP.NET x64,
# ASP.NET x86, and the IIS AspNetCoreModuleV2 — all in one installer.
- name: "[.NET {{ dotnet_pkg.major }}] Download Hosting Bundle"
  ansible.windows.win_get_url:
    url: "{{ dotnet_hosting_url }}"
    dest: "{{ iis_temp_download_path }}\\dotnet-hosting-{{ dotnet_latest_version }}-win.exe"
    checksum: "{{ dotnet_hosting_checksum }}"
    checksum_algorithm: sha512
    force: false
  when: not dotnet_pkg_check.result.installed
  register: dotnet_pkg_download

# --- Install Hosting Bundle -------------------------------------------------
- name: "[.NET {{ dotnet_pkg.major }}] Install Hosting Bundle"
  ansible.windows.win_package:
    path: "{{ iis_temp_download_path }}\\dotnet-hosting-{{ dotnet_latest_version }}-win.exe"
    arguments: >-
      /quiet
      /norestart
      OPT_NO_SHAREDFX=0
      OPT_NO_RUNTIME=0
      OPT_NO_ASPNETCORE=0
      /log "{{ iis_temp_download_path }}\\dotnet{{ dotnet_pkg.major }}_install.log"
    state: present
  when:
    - not dotnet_pkg_check.result.installed
    - dotnet_pkg_download is not failed
  register: dotnet_pkg_install
  notify:
    - "restart iis"
    - "restart app pools"

# --- On install failure, read log -------------------------------------------
- name: "[.NET {{ dotnet_pkg.major }}] Read install log on failure"
  ansible.windows.win_powershell:
    script: |
      $logPath = "{{ iis_temp_download_path }}\\dotnet{{ dotnet_pkg.major }}_install.log"
      if (Test-Path $logPath) { Get-Content $logPath | Select-Object -Last 50 }
      else { "Log file not found: $logPath" }
  when: dotnet_pkg_install is defined and dotnet_pkg_install is failed
  register: dotnet_pkg_log

- name: "[.NET {{ dotnet_pkg.major }}] Show install log"
  ansible.builtin.debug:
    msg: "{{ dotnet_pkg_log.result }}"
  when: dotnet_pkg_install is defined and dotnet_pkg_install is failed

# --- Optional standalone x86 Runtime ----------------------------------------
# The Hosting Bundle already installs x86, but this explicitly validates
# the x86 installation. Useful for 32-bit applications without a Hosting Bundle.
# Disable via iis_dotnet_install_individual_x86: false.
- name: "[.NET {{ dotnet_pkg.major }}] Download x86 Runtime"
  ansible.windows.win_get_url:
    url: "{{ dotnet_runtime_x86_url }}"
    dest: "{{ iis_temp_download_path }}\\dotnet-runtime-{{ dotnet_latest_version }}-win-x86.exe"
    checksum: "{{ dotnet_runtime_x86_checksum }}"
    checksum_algorithm: sha512
    force: false
  when:
    - iis_dotnet_install_individual_x86 | bool
    - not dotnet_pkg_check.result.installed
  register: dotnet_pkg_x86_download

- name: "[.NET {{ dotnet_pkg.major }}] Install x86 Runtime"
  ansible.windows.win_package:
    path: "{{ iis_temp_download_path }}\\dotnet-runtime-{{ dotnet_latest_version }}-win-x86.exe"
    arguments: /quiet /norestart
    state: present
  when:
    - iis_dotnet_install_individual_x86 | bool
    - not dotnet_pkg_check.result.installed
    - dotnet_pkg_x86_download is not failed
