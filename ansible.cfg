# =============================================================================
# ansible.cfg - Ansible configuration for IIS Windows deployment
# =============================================================================
# Adjust as needed. Never put sensitive settings (passwords) in this file.
# See: https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# Default inventory location
inventory            = inventory/hosts.yml

# Path to roles
roles_path           = roles

# Path to installed collections (relative to project)
collections_path     = collections

# Use yaml stdout callback for readable output (FQCN required in ansible-core >= 2.17)
stdout_callback      = ansible.builtin.yaml

# Number of parallel connections (adjust to infrastructure size)
forks                = 10

# Skip SSH host key checking (Windows/WinRM does not need this, but
# set to False for consistency in mixed environments)
host_key_checking    = False

# Detect Python interpreter automatically (silent, no warnings)
interpreter_python   = auto_silent

# Default timeout for module execution (Windows can be slow during .NET installs)
timeout              = 120

# Fact gathering: 'smart' = only when facts are not yet cached
gathering            = smart

# Facts caching: store facts in JSON files (speeds up repeated runs)
fact_caching             = jsonfile
fact_caching_connection  = .cache/facts
fact_caching_timeout     = 86400

# Do not create retry files (keeps project directory clean)
retry_files_enabled  = False

# Show task duration in output (useful for performance analysis)
# callbacks_enabled replaces deprecated callback_whitelist (ansible-core >= 2.14)
callbacks_enabled    = timer, profile_tasks

# Vault password file (optional; use --ask-vault-pass as alternative)
# vault_password_file = .vault_pass

# Ansible managed header for templates
ansible_managed      = Managed by Ansible - manual changes will be overwritten

[connection]
# Connection timeout (Windows WinRM is slower than SSH)
timeout = 60

[ssh_connection]
# SSH multiplexing (not relevant for Windows, but useful for mixed environments)
pipelining = True

[winrm]
# WinRM-specific timeout settings
operation_timeout_sec  = 120
read_timeout_sec       = 130
